version: '3.8'

services:
  backend:
    build:
      context: ./backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    environment:
      - RUN_BACKGROUND_SCHEDULER=true
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        # Route API requests through the Nginx reverse proxy
        - NEXT_PUBLIC_API_URL=/api
    expose:
      - "3000"
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always
